<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GAIA">
<meta name="theme-color" content="#08081c">
<title>GAIA — a living planet</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#08081c;
    --panel:#26264e;
    --panel2:#1a1a3a;
    --hi:#5a5aa6;
    --lo:#0a0a22;
    --lcd:#0c0c1e;
    --yellow:#ffe14d;
    --cyan:#54ffff;
    --green:#5dff67;
    --red:#ff5d52;
    --magenta:#ff6fe0;
    --txt:#eaeaff;
    --txt-dim:#9a9ada;
    --txt-faint:#5c5c92;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--txt);
    font-family:"VT323",ui-monospace,monospace;font-size:18px;line-height:1;
    -webkit-user-select:none;user-select:none;touch-action:none;image-rendering:pixelated;}
  .ps{font-family:"Press Start 2P",monospace;}
  .raised{box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .sunk{box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}

  #app{position:fixed;inset:0;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);}

  /* TOP BAR */
  #topbar{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px;background:var(--panel);}
  .btn{background:var(--panel);color:var(--txt);border:0;height:38px;padding:0 11px;
    font-family:"VT323",monospace;font-size:20px;display:flex;align-items:center;justify-content:center;gap:5px;}
  .btn:active{box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #play{min-width:50px;color:var(--green);font-size:18px;}
  #play.paused{color:var(--yellow);}
  .spds{display:flex;gap:3px;background:var(--lcd);padding:3px;box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  .spd{width:26px;height:30px;background:var(--panel);color:var(--txt-dim);border:0;
    font-family:"VT323",monospace;font-size:18px;box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .spd.on{background:var(--yellow);color:var(--void);box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #brand{flex:1 1 auto;text-align:center;color:var(--cyan);font-size:9px;letter-spacing:.02em;
    text-shadow:1px 1px 0 var(--lo);overflow:hidden;white-space:nowrap;}
  #brand b{color:var(--yellow);}

  /* READOUTS */
  #readouts{flex:0 0 auto;display:flex;gap:4px;padding:4px 6px;background:var(--panel);}
  .ro{flex:1 1 0;min-width:0;background:var(--lcd);padding:5px 6px 6px;
    box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);overflow:hidden;}
  .ro .l{font-size:13px;color:var(--txt-faint);letter-spacing:.05em;white-space:nowrap;line-height:1;}
  .ro .v{font-size:23px;margin-top:2px;line-height:.9;white-space:nowrap;text-shadow:0 0 6px currentColor;}
  .ro .v small{font-size:13px;text-shadow:none;}
  #ro-era{flex:1.7 1 0;}
  #ro-era .v{font-size:18px;color:var(--cyan);}
  #ro-era .clk{font-size:13px;color:var(--txt-dim);margin-top:3px;text-shadow:none;}
  #v-temp{color:var(--yellow);} #v-co2{color:var(--magenta);}
  #v-o2{color:var(--cyan);} #v-life{color:var(--green);}

  /* PLANET */
  #stage{flex:1 1 auto;position:relative;overflow:hidden;background:#04040e;
    box-shadow:inset 3px 3px 0 var(--lo), inset -3px -3px 0 var(--hi);}
  #planet{position:absolute;inset:0;width:100%;height:100%;display:block;
    image-rendering:pixelated;image-rendering:crisp-edges;}
  #scan{position:absolute;inset:0;pointer-events:none;opacity:.18;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,.5) 0 1px,transparent 1px 3px);}
  #layers{position:absolute;top:7px;left:7px;z-index:5;
    display:flex;background:var(--panel);padding:3px;box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .lay{background:var(--panel);color:var(--txt-dim);border:0;height:30px;padding:0 10px;
    font-family:"VT323",monospace;font-size:17px;letter-spacing:.04em;}
  .lay.on{background:var(--cyan);color:var(--void);box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #toast{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);z-index:6;
    background:var(--panel);color:var(--yellow);font-size:18px;padding:8px 14px;
    box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);
    opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;line-height:1.15;}

  /* LIFE LEGEND — families present on the map */
  #lifeKey{position:absolute;left:7px;top:46px;z-index:5;display:none;background:rgba(12,12,30,.82);
    padding:5px 7px;max-width:48%;box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  #lifeKey span{display:flex;align-items:center;gap:5px;font-size:15px;color:var(--txt-dim);line-height:1.5;white-space:nowrap;}
  #lifeKey i{width:11px;height:11px;flex:0 0 auto;display:inline-block;box-shadow:inset 1px 1px 0 rgba(255,255,255,.25);}
  #lifeKey .empty{color:var(--txt-faint);}

  /* FAUNA PICKER — choose a family to place */
  #faunaBar{position:absolute;left:0;right:0;bottom:0;z-index:7;display:none;gap:4px;
    padding:5px 6px;background:rgba(20,20,46,.94);overflow-x:auto;scrollbar-width:none;box-shadow:inset 0 3px 0 var(--lo);}
  #faunaBar::-webkit-scrollbar{display:none;}
  .fchip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;
    background:var(--panel);color:var(--txt-dim);border:0;padding:4px 7px 5px;min-width:54px;
    font-family:"VT323",monospace;box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .fchip i{width:100%;height:5px;display:block;}
  .fchip .fe{font-size:19px;line-height:1;}
  .fchip .fn{font-size:13px;line-height:1;letter-spacing:.02em;}
  .fchip.on{background:var(--cyan);color:var(--void);box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}

  /* BIOME PORTRAIT — current dominant lifeform (SimEarth-style window) */
  #biowin{position:absolute;right:7px;top:7px;z-index:5;display:none;align-items:center;gap:7px;
    background:rgba(12,12,30,.85);padding:4px 8px 4px 4px;box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  #biowin .bi{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:25px;flex:0 0 auto;
    background:var(--lcd);box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #biowin .bx{min-width:0;}
  #biowin .bx b{display:block;font-size:17px;color:var(--cyan);line-height:1.05;white-space:nowrap;}
  #biowin .bx small{font-size:13px;color:var(--txt-dim);letter-spacing:.03em;}

  /* EVOLUTION MILESTONE CARD */
  #flash{position:absolute;inset:0;z-index:14;background:#fff;opacity:0;pointer-events:none;}
  #flash.go{animation:flashA .5s steps(5,end) 1;}
  @keyframes flashA{0%{opacity:0}18%{opacity:.45}100%{opacity:0}}
  #evo{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%) scale(.55);z-index:15;
    min-width:226px;max-width:88%;background:var(--panel);text-align:center;padding:0 0 13px;
    opacity:0;pointer-events:none;
    box-shadow:inset 3px 3px 0 var(--hi), inset -3px -3px 0 var(--lo), 0 0 0 3px var(--void), 7px 7px 0 rgba(0,0,0,.45);
    transition:opacity .12s steps(2,end), transform .2s steps(4,end);}
  #evo.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
  #evo .et{font-family:"Press Start 2P";font-size:9px;color:var(--void);background:var(--fam,#ffe14d);
    padding:7px 8px;letter-spacing:.05em;}
  #evo .ei{font-size:46px;line-height:1;margin:13px 0 5px;filter:drop-shadow(2px 2px 0 var(--lo));}
  #evo .en{font-family:"Press Start 2P";font-size:14px;color:var(--fam,#ffe14d);text-shadow:2px 2px 0 var(--lo);margin-bottom:8px;letter-spacing:.02em;}
  #evo .ed{font-size:18px;color:var(--txt-dim);line-height:1.2;padding:0 16px;}
  #evo .ee{font-size:14px;color:var(--cyan);margin-top:8px;letter-spacing:.1em;}

  /* CONSOLE LINE */
  #console{flex:0 0 auto;display:flex;align-items:stretch;gap:5px;padding:5px 6px;background:var(--panel);}
  #energy{flex:0 0 auto;width:108px;background:var(--lcd);padding:5px 7px;
    box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #energy .l{font-size:13px;color:var(--txt-faint);line-height:1;}
  #energy .bar{height:11px;margin-top:4px;background:#000;position:relative;box-shadow:inset 1px 1px 0 var(--lo);}
  #energy .fill{position:absolute;inset:0;width:50%;background:linear-gradient(var(--yellow),#c9a800);}
  #energy .n{font-size:13px;color:var(--yellow);margin-top:3px;line-height:1;}
  #hint{flex:1 1 auto;background:var(--lcd);padding:7px 9px;display:flex;align-items:center;
    box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);font-size:19px;color:var(--txt);line-height:1.1;}
  #hint b{color:var(--cyan);} #hint .hot{color:var(--yellow);}

  /* TOOL DOCK */
  #dock{flex:0 0 auto;display:flex;gap:5px;padding:6px;background:var(--panel);
    overflow-x:auto;scrollbar-width:none;padding-bottom:calc(6px + env(safe-area-inset-bottom));}
  #dock::-webkit-scrollbar{display:none;}
  .tool{flex:0 0 auto;width:60px;height:62px;background:var(--panel);border:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    color:var(--txt-dim);position:relative;box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .tool .ic{font-size:22px;line-height:1;filter:saturate(1.1);}
  .tool .nm{font-size:14px;letter-spacing:.02em;line-height:1;}
  .tool .cost{position:absolute;top:2px;right:4px;font-size:12px;color:var(--yellow);}
  .tool.on{background:var(--yellow);color:var(--void);box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  .tool.on .cost{color:var(--void);}
  .tool:active{box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}

  /* MONITORS */
  #monitors{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--panel);
    box-shadow:inset 3px 3px 0 var(--hi), inset -3px -3px 0 var(--lo), 0 -10px 0 rgba(0,0,0,.4);
    transform:translateY(110%);transition:transform .28s steps(6,end);
    max-height:84vh;overflow-y:auto;padding:0 12px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
  #monitors.open{transform:translateY(0);}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:12px 0;position:sticky;top:0;background:var(--panel);}
  .mhead h2{font-family:"Press Start 2P";font-size:12px;color:var(--yellow);}
  .mhead h2 span{color:var(--cyan);}
  .xbtn{background:var(--panel);color:var(--txt);border:0;width:34px;height:34px;font-size:20px;
    box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .graphs{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .graph{background:var(--lcd);padding:7px 8px 4px;box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  .graph .gl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
  .graph .gt{font-size:14px;color:var(--txt-faint);letter-spacing:.04em;}
  .graph .gv{font-size:20px;}
  .graph canvas{width:100%;height:42px;display:block;image-rendering:auto;}
  .sect{font-size:14px;color:var(--cyan);letter-spacing:.1em;margin:16px 0 7px;border-bottom:2px solid var(--lo);padding-bottom:5px;}
  #atmoBar{display:flex;height:24px;overflow:hidden;box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #atmoBar div{display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(0,0,0,.75);overflow:hidden;white-space:nowrap;}
  .leg{display:flex;flex-wrap:wrap;gap:12px;margin-top:7px;}
  .leg span{font-size:16px;color:var(--txt-dim);display:flex;align-items:center;gap:5px;}
  .dot{width:11px;height:11px;display:inline-block;}
  #ladder{display:flex;flex-direction:column-reverse;gap:2px;}
  .rung{display:flex;align-items:center;gap:9px;font-size:17px;padding:4px 8px;color:var(--txt-faint);
    background:var(--lcd);box-shadow:inset 1px 1px 0 var(--lo);}
  .rung.reached{color:var(--green);}
  .rung.current{background:var(--green);color:var(--void);}
  .rung .rn{width:18px;opacity:.7;}
  #civBox{font-size:18px;color:var(--txt-dim);background:var(--lcd);padding:11px 12px;line-height:1.5;
    box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  #civBox b{color:var(--txt);} #civBox .warn{color:var(--red);} #civBox .good{color:var(--green);}

  /* MODAL */
  #modal{position:fixed;inset:0;z-index:50;background:rgba(4,4,16,.9);display:flex;align-items:center;justify-content:center;
    padding:calc(env(safe-area-inset-top) + 10px) 12px calc(env(safe-area-inset-bottom) + 10px);}
  #modal.hidden{display:none;}
  .card{width:100%;max-width:430px;background:var(--panel);padding:14px;max-height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;
    box-shadow:inset 3px 3px 0 var(--hi), inset -3px -3px 0 var(--lo);}
  .titlebar{background:var(--cyan);color:var(--void);font-family:"Press Start 2P";font-size:10px;
    padding:6px 9px;margin:-14px -14px 10px;display:flex;align-items:center;justify-content:space-between;}
  .titlebar .dotwin{display:flex;gap:4px;}
  .titlebar .dotwin i{width:11px;height:11px;background:var(--void);display:block;box-shadow:1px 1px 0 rgba(255,255,255,.3);}
  .card h1{font-family:"Press Start 2P";font-size:17px;line-height:1.15;margin:2px 0 8px;color:var(--yellow);text-shadow:2px 2px 0 var(--lo);}
  .card .sub{font-family:"Press Start 2P";color:var(--txt-dim);font-size:9px;line-height:1.5;margin-bottom:14px;}
  .scen-t{font-family:"Press Start 2P";font-size:8px;color:var(--cyan);letter-spacing:.06em;margin-bottom:8px;}
  .scen{display:flex;flex-direction:column;gap:6px;}
  .sbtn{text-align:left;background:var(--panel);color:var(--txt);border:0;padding:9px 10px;display:flex;gap:11px;align-items:center;
    box-shadow:inset 2px 2px 0 var(--hi), inset -2px -2px 0 var(--lo);}
  .sbtn:active{box-shadow:inset 2px 2px 0 var(--lo), inset -2px -2px 0 var(--hi);}
  .sbtn .se{font-size:22px;flex:0 0 auto;}
  .sbtn .sx b{font-family:"Press Start 2P";font-size:10px;display:block;color:var(--cyan);line-height:1.1;}
  .sbtn .sx small{font-family:"Press Start 2P";font-size:7px;color:var(--txt-dim);line-height:1.5;display:block;margin-top:6px;letter-spacing:.02em;}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <button class="btn" id="play">▶</button>
    <div class="spds">
      <button class="spd" data-spd="1">1</button>
      <button class="spd on" data-spd="2">2</button>
      <button class="spd" data-spd="3">3</button>
      <button class="spd" data-spd="4">4</button>
    </div>
    <div id="brand" class="ps">GAIA <b>CONSOLE</b></div>
    <button class="btn" id="monBtn">📊</button>
    <button class="btn" id="newBtn">⟲</button>
  </div>

  <div id="readouts">
    <div class="ro" id="ro-era"><div class="l">ERA</div><div class="v" id="v-era">—</div><div class="clk" id="v-clk">—</div></div>
    <div class="ro"><div class="l">TEMP</div><div class="v" id="v-temp">—</div></div>
    <div class="ro"><div class="l">CO₂</div><div class="v" id="v-co2">—</div></div>
    <div class="ro"><div class="l">O₂</div><div class="v" id="v-o2">—</div></div>
    <div class="ro"><div class="l">LIFE</div><div class="v" id="v-life">—</div></div>
  </div>

  <div id="stage">
    <canvas id="planet"></canvas>
    <div id="scan"></div>
    <div id="layers">
      <button class="lay on" data-layer="terrain">LAND</button>
      <button class="lay" data-layer="climate">HEAT</button>
      <button class="lay" data-layer="life">LIFE</button>
      <button class="lay" data-layer="air">AIR</button>
    </div>
    <div id="biowin"><div class="bi"></div><div class="bx"></div></div>
    <div id="lifeKey"></div>
    <div id="flash"></div>
    <div id="evo"></div>
    <div id="toast"></div>
    <div id="faunaBar"></div>
  </div>

  <div id="console">
    <div id="energy">
      <div class="l">ENERGY</div>
      <div class="bar"><div class="fill" id="enFill"></div></div>
      <div class="n" id="enNum">0</div>
    </div>
    <div id="hint">Pick a tool below, then tap the planet.</div>
  </div>

  <div id="dock"></div>
</div>

<div id="monitors">
  <div class="mhead"><h2>PLANET <span>MONITORS</span></h2><button class="xbtn" id="monClose">✕</button></div>
  <div class="graphs">
    <div class="graph"><div class="gl"><span class="gt">MEAN TEMP °C</span><span class="gv" id="g-temp-v" style="color:var(--yellow)">—</span></div><canvas id="g-temp"></canvas></div>
    <div class="graph"><div class="gl"><span class="gt">CO₂ ppm</span><span class="gv" id="g-co2-v" style="color:var(--magenta)">—</span></div><canvas id="g-co2"></canvas></div>
    <div class="graph"><div class="gl"><span class="gt">O₂ %</span><span class="gv" id="g-o2-v" style="color:var(--cyan)">—</span></div><canvas id="g-o2"></canvas></div>
    <div class="graph"><div class="gl"><span class="gt">BIOMASS</span><span class="gv" id="g-bio-v" style="color:var(--green)">—</span></div><canvas id="g-bio"></canvas></div>
  </div>
  <div class="sect">ATMOSPHERE</div>
  <div id="atmoBar"></div>
  <div class="leg" id="atmoLeg"></div>
  <div class="sect">TREE OF LIFE</div>
  <div id="ladder"></div>
  <div class="sect">CIVILIZATION</div>
  <div id="civBox">No sentient life has emerged.</div>
</div>

<div id="modal">
  <div class="card">
    <div class="titlebar"><span>GAIA.EXE</span><span class="dotwin"><i></i><i></i><i></i></span></div>
    <h1>GAIA<br>CONSOLE</h1>
    <p class="sub">Shape a living world.</p>
    <div class="scen-t">SELECT A WORLD</div>
    <div class="scen" id="scenList"></div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
